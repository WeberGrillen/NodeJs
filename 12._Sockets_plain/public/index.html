<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png">
    <title>Colors</title>
</head>
<body>
    <input type="color" id="color-picker">
    <button onclick="submitColor()">Submit Color</button>

    <!-- Task: print the color when a user submits it-->

    <script src="/socket.io/socket.io.js"></script>

    <script>
        const socket = io();
        const colorPicker = document.getElementById("color-picker");

        function submitColor() {
            const colorValue = colorPicker.value;
            
            socket.emit("client-sends-color", { data: colorValue });
        }
    
        socket.on("server-sends-color", (data) => {
            document.body.style.backgroundColor = data.data;
        });
    </script>
</body>
</html>
